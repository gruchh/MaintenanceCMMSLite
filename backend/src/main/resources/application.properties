spring.application.name=LightweightMaintenanceManagementSystem

# Server Configuration
server.port=8080

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Security
jwt.token.secretKey=${JWT_SECRET_KEY:dasasdasdsadjsajddsjaxjsajxsxasadasdsa}
jwt.token.duration=${JWT_TOKEN_DURATION:36000000}
jwt.refresh-duration=${JWT_REFRESH_DURATION:604800000}
jwt.token.issuer=${JWT_TOKEN_ISSUER:xxx}

# Logging
logging.level.com.portfolio=DEBUG
logging.level.org.springframework.web=DEBUG
